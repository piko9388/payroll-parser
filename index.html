<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>급여 명세서 파서</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Malgun Gothic', 'Trebuchet MS', sans-serif;
  background: #f5f5f5;
  color: #222;
  font-size: 15px;
  line-height: 1.7;
}

/* ── Header ── */
.header {
  background: #fff;
  padding: 14px 16px;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky; top: 0; z-index: 100;
}
.header h1 { font-size: 17px; color: #333; }
.header h1 em { font-style: normal; font-size: 12px; color: #999; margin-left: 4px; }
.badge { font-size: 12px; background: #e8f0fe; color: #1a73e8; padding: 4px 10px; border-radius: 4px; }

/* ── Tabs ── */
.tabs {
  display: flex;
  background: #fff;
  border-bottom: 1px solid #ddd;
}
.tab {
  flex: 1;
  padding: 12px 4px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: #888;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
}
.tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }

/* ── Content ── */
.wrap { padding: 14px; max-width: 1200px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; }

/* ── Card ── */
.card {
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  padding: 16px;
  margin-bottom: 14px;
}
.card-title {
  font-size: 14px;
  font-weight: 700;
  color: #333;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #eee;
}

/* ── Textarea ── */
textarea {
  width: 100%;
  height: 180px;
  border: 1px solid #ccc;
  border-radius: 4px;
  padding: 12px;
  font-family: 'D2Coding', 'Consolas', monospace;
  font-size: 13px;
  resize: vertical;
  outline: none;
  color: #333;
  background: #fafafa;
}
textarea:focus { border-color: #1a73e8; background: #fff; }

/* ── Buttons ── */
.btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

.btn {
  padding: 10px 18px;
  border: none;
  border-radius: 4px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.btn-primary { background: #1a73e8; color: #fff; }
.btn-primary:active { background: #1557b0; }
.btn-outline { background: #fff; color: #1a73e8; border: 1px solid #1a73e8; }
.btn-success { background: #0d7c3d; color: #fff; }
.btn-danger { background: #fff; color: #d32f2f; border: 1px solid #e0e0e0; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ── Parse Results ── */
.parse-result {
  margin-top: 10px;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  overflow: hidden;
}
.result-header {
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 700;
  display: flex;
  justify-content: space-between;
}
.result-match { background: #e8f5e9; color: #2e7d32; }
.result-new { background: #fff3e0; color: #e65100; }
.result-mismatch { background: #ffebee; color: #c62828; }

.result-body {
  padding: 12px 14px;
  background: #fff;
  font-size: 14px;
}
.result-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 20px;
}
.result-grid dt { color: #666; font-size: 13px; }
.result-grid dd { font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }

/* ── Table ── */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  background: #fff;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
thead th {
  background: #f0f0f0;
  color: #333;
  padding: 10px 12px;
  font-weight: 700;
  text-align: center;
  border-bottom: 2px solid #ddd;
  position: sticky; top: 0;
}
tbody td {
  padding: 8px 12px;
  border-bottom: 1px solid #f0f0f0;
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: #333;
}
tbody td:nth-child(-n+3) { text-align: center; }
tbody td:last-child { text-align: left; }
tbody tr:hover { background: #fafafa; }
tbody tr.year-start { border-top: 2px solid #1a73e8; }
.neg { color: #d32f2f; }

/* ── Filter ── */
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
select {
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 13px;
  font-family: inherit;
  background: #fff;
  color: #333;
}

/* ── Stats ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}
.stat-card {
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  padding: 14px;
  text-align: center;
}
.stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 700; color: #222; }
.stat-sub { font-size: 11px; color: #999; margin-top: 2px; }

/* ── Empty ── */
.empty-state { text-align: center; padding: 40px 20px; color: #999; }
.empty-state .icon { font-size: 32px; margin-bottom: 8px; }
.empty-state p { font-size: 14px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #333; color: #fff;
  padding: 12px 24px; border-radius: 6px;
  font-size: 14px; font-weight: 600;
  z-index: 999; opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@media (max-width: 640px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .stat-value { font-size: 17px; }
}
</style>
</head>

<!-- ═══ LOGIN GATE ═══ -->
<div id="loginGate" style="
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#f5f5f5; z-index:9999;
  display:flex; align-items:center; justify-content:center;
">
  <div style="
    background:#fff; border:1px solid #ddd; border-radius:8px;
    padding:32px 28px; width:320px; max-width:90%;
    text-align:center;
  ">
    <h2 style="font-size:18px; color:#333; margin-bottom:6px; font-family:'Malgun Gothic','Trebuchet MS',sans-serif;">급여 파서</h2>
    <p style="font-size:13px; color:#999; margin-bottom:24px;">인증이 필요합니다</p>
    <input id="loginId" type="text" placeholder="사번" autocomplete="username" style="
      width:100%; padding:12px 14px; border:1px solid #ccc; border-radius:4px;
      font-size:15px; font-family:inherit; margin-bottom:10px; outline:none;
      color:#333; background:#fafafa;
    " onfocus="this.style.borderColor='#1a73e8';this.style.background='#fff'"
      onblur="this.style.borderColor='#ccc';this.style.background='#fafafa'">
    <input id="loginPw" type="password" placeholder="비밀번호" autocomplete="current-password" style="
      width:100%; padding:12px 14px; border:1px solid #ccc; border-radius:4px;
      font-size:15px; font-family:inherit; margin-bottom:16px; outline:none;
      color:#333; background:#fafafa;
    " onfocus="this.style.borderColor='#1a73e8';this.style.background='#fff'"
      onblur="this.style.borderColor='#ccc';this.style.background='#fafafa'"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" style="
      width:100%; padding:12px; background:#1a73e8; color:#fff;
      border:none; border-radius:4px; font-size:15px; font-weight:700;
      cursor:pointer; font-family:inherit;
    ">로그인</button>
    <p id="loginErr" style="font-size:13px; color:#d32f2f; margin-top:12px; display:none;">사번 또는 비밀번호가 올바르지 않습니다.</p>
  </div>
</div>

<script>
const AUTH_HASH = 'ac653affb03c9c0782559ad9168073a17fdc42c7448e71830edf52671c893ac7';
const AUTH_KEY = 'payroll_auth_v1';

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const hash = await sha256(id + ':' + pw);
  if (hash === AUTH_HASH) {
    sessionStorage.setItem(AUTH_KEY, '1');
    document.getElementById('loginGate').style.display = 'none';
    document.getElementById('loginErr').style.display = 'none';
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('loginPw').value = '';
    document.getElementById('loginPw').focus();
  }
}

// Auto-login if already authenticated this session
if (sessionStorage.getItem(AUTH_KEY) === '1') {
  document.getElementById('loginGate').style.display = 'none';
}
</script>


<div class="header">
  <h1>급여 파서<em>v1.0</em></h1>
  <div class="badge" id="dbBadge">0건</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('parse')">파싱</button>
  <button class="tab" onclick="switchTab('data')">전체 데이터</button>
  <button class="tab" onclick="switchTab('summary')">연도 요약</button>
  <button class="tab" onclick="switchTab('settings')">설정</button>
</div>

<div class="wrap">
  <div class="panel active" id="panel-parse">
    <div class="card">
      <div class="card-title">SMS 명세서 붙여넣기</div>
      <textarea id="smsInput" placeholder="급여 명세서 문자를 여기에 붙여넣으세요.&#10;여러 건을 한꺼번에 붙여넣어도 자동으로 분리됩니다."></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="parseSMS()">파싱 실행</button>
        <button class="btn btn-outline" onclick="clearInput()">초기화</button>
      </div>
    </div>
    <div id="parseResults"></div>
  </div>

  <div class="panel" id="panel-data">
    <div class="filter-row">
      <select id="filterYear" onchange="renderTable()">

      </select>
      <select id="filterType" onchange="renderTable()">
        <option value="">전체 구분</option>
        <option value="급여">급여</option>
        <option value="PI">PI</option>
        <option value="PS">PS</option>
        <option value="격려금">격려금</option>
        <option value="성과급">성과급</option>
        <option value="기타">기타</option>
      </select>
      <button class="btn btn-success btn-sm" onclick="downloadXlsx()">Excel 다운로드</button>
    </div>
    <div class="table-wrap" id="dataTable"></div>
  </div>

    <div class="card">

        모든 데이터는 브라우저 localStorage에 저장됩니다.<br>
        주기적으로 Excel 다운로드로 백업하세요.

<div class="toast" id="toast"></div>

<script>

// ════════════════════════════════════════
// DB (localStorage)
// ════════════════════════════════════════
const DB_KEY = 'payroll_db_v1';

function loadDB() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || []; }
  catch { return []; }
}

function saveDB(data) {
  localStorage.setItem(DB_KEY, JSON.stringify(data));
  updateBadge();
}

function updateBadge() {
  const db = loadDB();
  document.getElementById('dbBadge').textContent = db.length + '건 저장';
}

// ════════════════════════════════════════
// SMS Parser
// ════════════════════════════════════════
function parseSMS() {
  const raw = document.getElementById('smsInput').value.trim();
  if (!raw) { toast('텍스트를 붙여넣어 주세요'); return; }

  const blocks = raw.split(/\[Web발신\]/).filter(b => b.trim());
  const parsed = [];

  for (const block of blocks) {
    if (block.includes('의료비 담당')) continue;
    const rec = parseBlock(block);
    if (rec && rec.총지급액 > 0) parsed.push(rec);
  }

  if (parsed.length === 0) {
    toast('파싱 가능한 명세서가 없습니다');
    return;
  }

  // Deduplicate and save
  const db = loadDB();
  let newCount = 0, updateCount = 0;
  const results = [];

  for (const rec of parsed) {
    const key = `${rec.연도}-${rec.월}-${rec.구분}`;
    const idx = db.findIndex(d => `${d.연도}-${d.월}-${d.구분}` === key);

    if (idx >= 0) {
      const existing = db[idx];
      const changed = existing.총지급액 !== rec.총지급액 || existing.차인지급액 !== rec.차인지급액;
      if (changed) {
        db[idx] = rec;
        updateCount++;
        results.push({ rec, status: 'updated', old: existing });
      } else {
        results.push({ rec, status: 'exists' });
      }
    } else {
      db.push(rec);
      newCount++;
      results.push({ rec, status: 'new' });
    }
  }

  // Sort DB
  db.sort((a, b) => (a.연도 - b.연도) || (a.월 - b.월) || a.구분.localeCompare(b.구분));
  saveDB(db);
  renderParseResults(results);
  toast(`${parsed.length}건 파싱 완료 (신규 ${newCount}, 갱신 ${updateCount})`);
}

function parseBlock(block) {
  const rec = {};

  // Year/Month
  const ym = block.match(/(\d{4})년\s*(\d{1,2})월/);
  if (ym) {
    rec.연도 = +ym[1];
    rec.월 = +ym[2];
  } else {
    const y = block.match(/(\d{4})년/);
    if (y) rec.연도 = +y[1];
    else return null;
    rec.월 = 0;
  }

  // Type detection (from pre-header section)
  const preHeader = block.split(/급여개요/)[0] || block.substring(0, 300);
  if (/급여,PS,특별성과급/.test(preHeader)) rec.구분 = 'PS/급여';
  else if (/PS,특별성과급/.test(preHeader)) rec.구분 = 'PS';
  else if (/PS\s*(지급|명세)/.test(preHeader) && !/급여명세/.test(preHeader)) rec.구분 = 'PS';
  else if (/위기\s*극복\s*격려금/.test(preHeader)) rec.구분 = '격려금';
  else if (/One\s*Team\s*Mind|ONE\s*TEAM/i.test(preHeader)) rec.구분 = '격려금';
  else if (/추석\s*특별격려금/.test(preHeader)) rec.구분 = '격려금';
  else if (/특별격려금|격려금\s*(지급|명세)/.test(preHeader)) rec.구분 = '격려금';
  else if (/AI시대.*격려금/.test(preHeader)) rec.구분 = '격려금';
  else if (/특별성과급\s*(지급|명세)/.test(preHeader) && !/PS/.test(preHeader)) rec.구분 = '성과급';
  else if (/특별축하금/.test(preHeader)) rec.구분 = '축하금';
  else if (/기여금/.test(preHeader)) rec.구분 = '기여금';
  else if (/PI\s*(지급|명세)|상반기\s*PI|하반기\s*PI/.test(preHeader) && !/급여명세/.test(preHeader)) rec.구분 = 'PI';
  else if (/Talent\s*Bonus/.test(block)) rec.구분 = '급여';
  else rec.구분 = '급여';

  // Core amounts
  rec.총지급액 = extractNum(block, /총지급액\s*[:：]\s*([\-\d,]+)/);
  rec.공제계 = extractNum(block, /공제계\s*[:：]\s*(-?[\-\d,]+)/);
  rec.저축상환 = extractNum(block, /저축\/상환\s*[:：]\s*([\-\d,]+)/);
  rec.차인지급액 = extractNum(block, /차인지급액\s*[:：]\s*([\-\d,]+)/);

  // Pay items
  const paySection = (block.match(/지급내역([\s\S]*?)(?:공제내역|$)/) || [])[1] || '';
  const dedSection = (block.match(/공제내역([\s\S]*?)(?:연차내역|누계액|문의|$)/) || [])[1] || '';

  rec.기본급 = extractItem(paySection, '기본급');
  rec.고정OT = extractItem(paySection, '고정시간외수당');
  rec.업적급 = extractItem(paySection, '업적급');
  rec.연금보조 = extractItem(paySection, '연금보조');

  // Overtime/holiday/backpay/annual leave
  rec.연장휴일소급연차 = 0;
  for (const label of ['평일연장근로수당', '휴일근무수당', '소급금', '연차수당']) {
    rec.연장휴일소급연차 += extractItem(paySection, label);
  }

  // Bonuses (PS/PI/격려금 등)
  rec.성과급 = 0;
  for (const label of ['PS', 'PI', '생산성 인센티브', '특별격려금', '격려금', '특별성과급', '특별축하금',
                         '미래성장 특별 기여금', '명절격려금', '위기 극복 격려금', 'Talent Bonus',
                         '추석 특별격려금']) {
    rec.성과급 += extractItem(paySection, label);
  }

  // Benefits/points/others
  const knownPay = rec.기본급 + rec.고정OT + rec.업적급 + rec.연금보조 + rec.연장휴일소급연차 + rec.성과급;
  rec.복리후생기타 = rec.총지급액 - knownPay;
  if (Math.abs(rec.복리후생기타) < 0 && rec.복리후생기타 < 0) rec.복리후생기타 = 0;

  // Deductions
  const tax = extractItem(dedSection, '소득세') || 0;
  const taxYS = extractItem(dedSection, '소득세\\(연말정산\\)') || 0;
  rec.소득세 = tax + taxYS;

  const localTax = extractItem(dedSection, '지방소득세') || 0;
  const localTaxYS = extractItem(dedSection, '지방소득세\\(연말정산\\)') || extractItem(dedSection, '지방소득세\\(연말정산\\)') || 0;
  rec.지방세 = localTax + localTaxYS;

  rec.국민연금 = extractItem(dedSection, '국민연금');

  const hi = extractItem(dedSection, '건강보험료') || 0;
  const hiAdj = extractItem(dedSection, '건강보험료 정산') || 0;
  rec.건강보험 = hi + hiAdj;

  rec.고용보험 = extractItem(dedSection, '고용보험');
  const ysEmp = extractItem(dedSection, '연말과표 고용보험') || 0;
  rec.고용보험 += ysEmp;

  // Other deductions detail
  rec.기타공제 = rec.공제계 - (rec.소득세 + rec.지방세 + rec.국민연금 + rec.건강보험 + rec.고용보험);

  // Annual leave
  const alMatch = block.match(/잔여연차\s*[:：]\s*([\d.]+)/);
  rec.잔여연차 = alMatch ? parseFloat(alMatch[1]) : null;

  // Deduction detail items for reference
  rec.공제상세 = {};
  const dedItems = dedSection.matchAll(/([가-힣A-Za-z\-&\/\(\) ]+)\s*[:：]\s*(-?[\d,]+)/g);
  for (const m of dedItems) {
    rec.공제상세[m[1].trim()] = parseKRW(m[2]);
  }

  // Pay detail items
  rec.지급상세 = {};
  const payItems = paySection.matchAll(/([가-힣A-Za-z\-&\/\(\) ]+)\s*[:：]\s*(-?[\d,]+)/g);
  for (const m of payItems) {
    rec.지급상세[m[1].trim()] = parseKRW(m[2]);
  }

  return rec;
}

function extractNum(text, regex) {
  const m = text.match(regex);
  return m ? parseKRW(m[1]) : 0;
}

function extractItem(section, label) {
  const regex = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*[:：]\\s*(-?[\\d,]+)');
  const m = section.match(regex);
  return m ? parseKRW(m[1]) : 0;
}

function parseKRW(s) {
  if (!s) return 0;
  s = s.replace(/[,₩\s　]/g, '');
  if (!s || s === '-') return 0;
  return parseInt(s) || 0;
}

function formatKRW(n) {
  if (n === null || n === undefined) return '-';
  if (n === 0) return '-';
  const abs = Math.abs(n);
  const formatted = abs.toLocaleString('ko-KR');
  return n < 0 ? '-' + formatted : formatted;
}

function formatMan(n) {
  if (!n) return '-';
  return (n / 10000).toFixed(0) + '만';
}

      </div>

}

// ════════════════════════════════════════
// Data Table
// ════════════════════════════════════════
function renderTable() {
  let db = loadDB();
  const yearFilter = document.getElementById('filterYear').value;
  const typeFilter = document.getElementById('filterType').value;

  if (yearFilter) db = db.filter(d => d.연도 === +yearFilter);
  if (typeFilter) db = db.filter(d => d.구분.includes(typeFilter));

  if (db.length === 0) {
    document.getElementById('dataTable').innerHTML = `
      <div class="empty-state"><div class="icon">📭</div><p>데이터가 없습니다.<br>SMS를 붙여넣어 파싱해 주세요.</p></div>`;
    return;
  }

  const cols = ['연도','월','구분','기본급','고정OT','업적급','연금보조','연장휴일소급연차','성과급','복리후생기타','총지급액','소득세','지방세','국민연금','건강보험','고용보험','기타공제','공제계','저축상환','차인지급액'];
  const labels = ['연도','월','구분','기본급','고정OT','업적급','연금보조','연장/소급','성과급','복리/기타','총지급액','소득세','지방세','국민연금','건강보험','고용보험','기타공제','공제계','저축','실수령'];

  let html = '<table><thead><tr>';
  for (const l of labels) html += `<th>${l}</th>`;
  html += '<th>삭제</th></tr></thead><tbody>';

  let prevYear = null;
  for (const row of db) {
    const yearClass = row.연도 !== prevYear && prevYear !== null ? ' class="year-start"' : '';
    prevYear = row.연도;
    html += `<tr${yearClass}>`;
    for (const col of cols) {
      const v = row[col];
      if (typeof v === 'number' && col !== '연도' && col !== '월') {
        html += `<td${v < 0 ? ' class="neg"' : ''}>${formatKRW(v)}</td>`;
      } else {
        html += `<td>${v ?? '-'}</td>`;
      }
    }
    html += `<td><button class="btn btn-danger btn-sm" onclick="deleteRecord(${row.연도},${row.월},'${row.구분}')">✕</button></td>`;
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('dataTable').innerHTML = html;
}

function deleteRecord(y, m, t) {
  if (!confirm(`${y}.${m} ${t} 삭제하시겠습니까?`)) return;
  let db = loadDB();
  db = db.filter(d => !(d.연도 === y && d.월 === m && d.구분 === t));
  saveDB(db);
  renderTable();
  toast('삭제 완료');
}

// ════════════════════════════════════════
// Summary
// ════════════════════════════════════════
function renderSummary() {
  const db = loadDB();
  if (db.length === 0) {
    document.getElementById('totalStats').innerHTML = '';
    document.getElementById('summaryTable').innerHTML = `
      <div class="empty-state"><div class="icon">📊</div><p>데이터가 없습니다.</p></div>`;
    return;
  }

  // Totals
  const totGross = db.reduce((s, d) => s + (d.총지급액 || 0), 0);
  const totNet = db.reduce((s, d) => s + (d.차인지급액 || 0), 0);
  const totBonus = db.reduce((s, d) => s + (d.성과급 || 0), 0);

  document.getElementById('totalStats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">누적 총지급</div>
      <div class="stat-value">${(totGross / 100000000).toFixed(1)}억</div>
      <div class="stat-sub">${db.length}건</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">누적 실수령</div>
      <div class="stat-value">${(totNet / 100000000).toFixed(1)}억</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">누적 성과급</div>
      <div class="stat-value">${(totBonus / 100000000).toFixed(1)}억</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">평균 실효세율</div>
      <div class="stat-value">${((1 - totNet / (totGross || 1)) * 100).toFixed(1)}%</div>
      <div class="stat-sub">저축 포함</div>
    </div>`;

  // Annual summary
  const annual = {};
  for (const d of db) {
    if (!annual[d.연도]) annual[d.연도] = { gross: 0, bonus: 0, ded: 0, save: 0, net: 0, baseLast: 0, cnt: 0 };
    const a = annual[d.연도];
    a.gross += d.총지급액 || 0;
    a.bonus += d.성과급 || 0;
    a.ded += d.공제계 || 0;
    a.save += d.저축상환 || 0;
    a.net += d.차인지급액 || 0;
    a.cnt++;
    if (d.기본급 > 0) a.baseLast = d.기본급;
  }

  const years = Object.keys(annual).sort();
  let html = '<table><thead><tr><th>연도</th><th>총지급</th><th>성과급</th><th>공제합</th><th>저축</th><th>실수령</th><th>실효세율</th><th>기본급</th><th>YoY</th></tr></thead><tbody>';

  let prevNet = null;
  for (const yr of years) {
    const a = annual[yr];
    const taxRate = a.gross > 0 ? ((a.gross - a.net - a.save) / a.gross * 100).toFixed(1) : '-';
    const yoy = prevNet ? ((a.net - prevNet) / prevNet * 100).toFixed(1) : '-';
    html += `<tr>
      <td>${yr}</td>
      <td>${formatMan(a.gross)}</td>
      <td>${formatMan(a.bonus)}</td>
      <td>${formatMan(a.ded)}</td>
      <td>${formatMan(a.save)}</td>
      <td style="font-weight:700">${formatMan(a.net)}</td>
      <td>${taxRate}%</td>
      <td>${formatMan(a.baseLast)}</td>
      <td${yoy !== '-' && parseFloat(yoy) > 0 ? ' style="color:var(--success)"' : yoy !== '-' && parseFloat(yoy) < 0 ? ' style="color:var(--danger)"' : ''}>${yoy !== '-' ? (parseFloat(yoy) > 0 ? '+' : '') + yoy + '%' : '-'}</td>
    </tr>`;
    prevNet = a.net;
  }
  html += '</tbody></table>';
  document.getElementById('summaryTable').innerHTML = html;
}

    const wsData = [headers];
    for (const d of db) {
      wsData.push(cols.map(c => (d[c] !== null && d[c] !== undefined) ? d[c] : ''));
    }
    const ws1 = XLSX.utils.aoa_to_sheet(wsData);
    ws1['!cols'] = headers.map(h => ({ wch: Math.max(h.length * 2, 10) }));
    XLSX.utils.book_append_sheet(wb, ws1, '전체급여내역');

    // ── Sheet 2: 연도별 요약 ──
    const annual = {};
    for (const d of db) {
      const yr = d.연도;
      if (!annual[yr]) annual[yr] = { gross:0, bonus:0, ded:0, save:0, net:0, base:0, cnt:0 };
      const a = annual[yr];
      a.gross += (d.총지급액 || 0);
      a.bonus += (d.성과급 || 0);
      a.ded += (d.공제계 || 0);
      a.save += (d.저축상환 || 0);
      a.net += (d.차인지급액 || 0);
      a.cnt++;
      if ((d.기본급 || 0) > 0) a.base = d.기본급;
    }
    const sumHeaders = ['연도','총지급액','성과급','공제합계','저축/상환','차인지급액(실수령)','실효세율(%)','기본급(최종)','건수','전년대비 실수령 증감율(%)'];
    const sumData = [sumHeaders];
    const years = Object.keys(annual).map(Number).sort((a,b)=>a-b);
    let prevNet = null;
    for (const yr of years) {
      const a = annual[yr];
      const taxRate = a.gross > 0 ? Math.round((a.gross - a.net - a.save) / a.gross * 1000) / 10 : 0;
      const yoy = (prevNet && prevNet > 0) ? Math.round((a.net - prevNet) / prevNet * 1000) / 10 : '';
      sumData.push([yr, a.gross, a.bonus, a.ded, a.save, a.net, taxRate, a.base, a.cnt, yoy]);
      prevNet = a.net;
    }
    const ws2 = XLSX.utils.aoa_to_sheet(sumData);
    ws2['!cols'] = sumHeaders.map(() => ({ wch: 16 }));
    XLSX.utils.book_append_sheet(wb, ws2, '연도별요약');

    // ── Sheet 3: 월별 실수령 추이 ──
    const monthHeaders = ['연도','월','구분','총지급액','공제계','저축/상환','차인지급액(실수령)','실수령비율(%)'];
    const monthData = [monthHeaders];
    for (const d of db) {
      const ratio = (d.총지급액 || 0) > 0 ? Math.round((d.차인지급액 || 0) / d.총지급액 * 1000) / 10 : 0;
      monthData.push([d.연도, d.월, d.구분, d.총지급액||0, d.공제계||0, d.저축상환||0, d.차인지급액||0, ratio]);
    }
    const ws3 = XLSX.utils.aoa_to_sheet(monthData);
    ws3['!cols'] = monthHeaders.map(() => ({ wch: 14 }));
    XLSX.utils.book_append_sheet(wb, ws3, '월별실수령추이');

    // ── Sheet 4: 공제 항목별 분해 ──
    const dedHeaders = ['연도','월','구분','소득세(정산포함)','지방세(정산포함)','국민연금','건강보험(정산포함)','고용보험','기타공제','공제계'];
    const dedData = [dedHeaders];
    for (const d of db) {
      dedData.push([d.연도, d.월, d.구분, d.소득세||0, d.지방세||0, d.국민연금||0, d.건강보험||0, d.고용보험||0, d.기타공제||0, d.공제계||0]);
    }
    const ws4 = XLSX.utils.aoa_to_sheet(dedData);
    ws4['!cols'] = dedHeaders.map(h => ({ wch: Math.max(h.length * 2, 10) }));
    XLSX.utils.book_append_sheet(wb, ws4, '공제항목분해');

    const now = new Date();
    const fname = '급여내역_' + now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '.xlsx';
    XLSX.writeFile(wb, fname);
    toast('Excel 4개 시트 다운로드 완료');
  } catch(e) {
    toast('다운로드 오류: ' + e.message);
    console.error(e);
  }
}

// JSON Import/Export
// ════════════════════════════════════════
function exportJSON() {
  const db = loadDB();
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `payroll_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('JSON 내보내기 완료');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error('배열이 아닙니다');
      const db = loadDB();
      let added = 0;
      for (const rec of data) {
        if (!rec.연도 || !rec.구분) continue;
        const key = `${rec.연도}-${rec.월}-${rec.구분}`;
        if (!db.find(d => `${d.연도}-${d.월}-${d.구분}` === key)) {
          db.push(rec);
          added++;
        }
      }
      db.sort((a, b) => (a.연도 - b.연도) || (a.월 - b.월));
      saveDB(db);
      toast(`${added}건 가져오기 완료 (중복 ${data.length - added}건 스킵)`);
      refreshAll();
    } catch (err) {
      toast('JSON 파일 형식 오류: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function confirmClear() {
  if (confirm('정말 전체 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
    if (confirm('마지막 확인: Excel 백업은 하셨나요?')) {
      localStorage.removeItem(DB_KEY);
      updateBadge();
      refreshAll();
      toast('전체 데이터 삭제 완료');
    }
  }
}

// UI Helpers
// ════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.target.classList.add('active');

  if (name === 'data') { updateFilterYears(); renderTable(); }
  if (name === 'summary') renderSummary();
  if (name === 'settings') renderSettings();
}

function updateFilterYears() {
  const db = loadDB();
  const years = [...new Set(db.map(d => d.연도))].sort();
  const sel = document.getElementById('filterYear');
  const cur = sel.value;
  sel.innerHTML = '<option value="">전체 연도</option>';
  for (const y of years) {
    sel.innerHTML += `<option value="${y}"${y == cur ? ' selected' : ''}>${y}년</option>`;
  }
}

function renderSettings() {
  const db = loadDB();
  const years = [...new Set(db.map(d => d.연도))].sort();
  const types = {};
  for (const d of db) types[d.구분] = (types[d.구분] || 0) + 1;

  let html = `<p>총 <strong>${db.length}건</strong> 저장됨</p>`;
  if (years.length > 0) {
    html += `<p>기간: ${years[0]}년 ~ ${years[years.length-1]}년</p>`;
    html += `<p>구분별: ${Object.entries(types).map(([k,v]) => `${k}(${v})`).join(', ')}</p>`;
    const bytes = new Blob([JSON.stringify(db)]).size;
    html += `<p>용량: ${(bytes / 1024).toFixed(1)} KB</p>`;
  }
  document.getElementById('settingsStats').innerHTML = html;
}

function clearInput() {
  document.getElementById('smsInput').value = '';
  document.getElementById('parseResults').innerHTML = '';
}

function refreshAll() {
  updateFilterYears();
  renderTable();
  renderSummary();
  renderSettings();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
